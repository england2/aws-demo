name: cpu-spin

on:
  push:
    branches:
      - main
    paths:
      - "test-applications/cpu-spin/**"
      - ".github/workflows/cpu-spin.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      ECR_REPOSITORY: cpu-spin
      DEPLOY_TARGET_TAG: debian-cpu-spin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::204772699175:role/github-actions-ecr-push

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            test-applications/cpu-spin

          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Look up debian-cpu-spin instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=$DEPLOY_TARGET_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Could not find running instance with Name tag $DEPLOY_TARGET_TAG"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy on debian-cpu-spin with SSM
        id: deploy
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy cpu-spin image $IMAGE_TAG" \
            --parameters commands="bash /home/admin/deploy-cpu-spin.sh $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command completion
        run: |
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"

      - name: Show SSM command result
        run: |
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"
