name: cpu-spin

on:
  push:
    branches:
      - main
    paths:
      - "test-applications/cpu-spin/**"
      - ".github/workflows/cpu-spin.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      ECR_REPOSITORY: cpu-spin
      DEPLOY_HOST: 35.167.192.31
      DEPLOY_USER: admin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::204772699175:role/github-actions-ecr-push

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            test-applications/cpu-spin

          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          docker tag "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" "$REGISTRY/$ECR_REPOSITORY:latest"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Write SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_DEMO_KEY_PEM }}
        run: |
          printf '%s\n' "$SSH_PRIVATE_KEY" > /tmp/aws-demo-key.pem
          chmod 600 /tmp/aws-demo-key.pem

      - name: Deploy on debian-cpu-spin
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no -i /tmp/aws-demo-key.pem "$DEPLOY_USER@$DEPLOY_HOST" \
            "bash /home/admin/deploy-cpu-spin.sh $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
