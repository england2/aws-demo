name: agent-fargate

on:
  push:
    branches:
      - main
    paths:
      - "agent-conductor/agent-fargate/**"
      - ".github/workflows/agent-fargate.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    # running on ubuntu-24.04-arm because we're building an arm64 go binary
    runs-on: ubuntu-24.04-arm

    env:
      AWS_REGION: us-west-2
      ECR_REPOSITORY: agent-fargate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::204772699175:role/github-actions-ecr-push

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker buildx build \
            --platform linux/arm64 \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            --push \
            agent-conductor/agent-fargate/container
