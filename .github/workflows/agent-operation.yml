name: agent-operation

on:
  push:
    branches:
      - main
    paths:
      - "agent-conductor/go-agent-conductor/**"
      - "infra/debian-agent-operation/inside/**"
      - ".github/workflows/agent-operation.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-west-2
      DEPLOY_TARGET_TAG: debian-agent-operation
      ARTIFACT_BUCKET: aws-demo-agent-operation-artifacts-204772699175-us-west-2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: agent-conductor/go-agent-conductor/go.mod
          cache-dependency-path: agent-conductor/go-agent-conductor/go.sum

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::204772699175:role/github-actions-ecr-push

      - name: Look up debian-agent-operation instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --region "$AWS_REGION" \
            --filters "Name=tag:Name,Values=$DEPLOY_TARGET_TAG" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Could not find running instance with Name tag $DEPLOY_TARGET_TAG"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy agent-operation with SSM
        id: deploy
        run: |
          if [ ! -d agent-conductor/go-agent-conductor ]; then
            echo "agent-conductor/go-agent-conductor is missing from this checkout."
            exit 1
          fi

          if [ ! -f infra/debian-agent-operation/inside/agent-operation.service ]; then
            echo "infra/debian-agent-operation/inside/agent-operation.service is missing from this checkout."
            exit 1
          fi

          rm -rf /tmp/agent-operation-payload
          mkdir -p /tmp/agent-operation-payload

          cd agent-conductor/go-agent-conductor
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o /tmp/agent-operation-payload/agent-conductor .
          cd -

          cp infra/debian-agent-operation/inside/agent-operation.service /tmp/agent-operation-payload/agent-operation.service
          cp infra/debian-agent-operation/inside/deploy-agent-operation.sh /tmp/agent-operation-payload/deploy-agent-operation.sh
          tar -czf /tmp/agent-operation-payload.tar.gz -C /tmp/agent-operation-payload .

          ARTIFACT_KEY="agent-operation/${{ github.sha }}.tar.gz"
          ARTIFACT_URI="s3://$ARTIFACT_BUCKET/$ARTIFACT_KEY"

          aws s3 cp /tmp/agent-operation-payload.tar.gz "$ARTIFACT_URI"

          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "${{ steps.instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy agent-operation ${{ github.sha }}" \
            --parameters commands="set -euo pipefail; TMP_DIR=/tmp/agent-operation-bootstrap-${{ github.sha }}; rm -rf \$TMP_DIR; mkdir -p \$TMP_DIR; aws s3 cp $ARTIFACT_URI \$TMP_DIR/payload.tar.gz; tar -xzf \$TMP_DIR/payload.tar.gz -C \$TMP_DIR; sudo install -m 0755 \$TMP_DIR/deploy-agent-operation.sh /home/admin/deploy-agent-operation.sh; bash /home/admin/deploy-agent-operation.sh ${{ github.sha }} $ARTIFACT_URI; rm -rf \$TMP_DIR" \
            --query 'Command.CommandId' \
            --output text)

          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command completion
        run: |
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"

      - name: Show SSM command result
        if: ${{ always() && steps.deploy.outputs.command_id != '' }}
        run: |
          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "${{ steps.deploy.outputs.command_id }}" \
            --instance-id "${{ steps.instance.outputs.instance_id }}"
