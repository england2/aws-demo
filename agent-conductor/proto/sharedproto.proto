syntax = "proto3";

package sharedproto;

option go_package = "conductor-testing/proto;sharedproto";

// ---- File Transfer  -----------------------------------------

message FileTransferRequest {
  WorkerIdentity worker = 1;
  string worker_message = 2;
}

message FileTransferChunk {
  WorkerIdentity worker = 1;
  string worker_message = 2;
  bytes content = 3;
  int64 chunk_index = 4;
  bool final_chunk = 5;
}

// ---- General  -----------------------------------------------
message WorkerIdentity {
  string worker_id = 1;
}

message GeneralResponse {
  string worker_id = 1;
  string worker_message = 2;
}

message CodexError {
  string worker_id = 1;
  string worker_message = 2;
}


// ---- Client/Server Message Pairs  ---------------------------

message Test {
  WorkerIdentity worker = 1;
  string worker_message = 2;
}
message TestResponse {
  WorkerIdentity worker = 1;
  string worker_message = 2;
}

// ----------------------------

message Shutdown {
  WorkerIdentity worker = 1;
  string worker_message = 2;
}

// ----------------------------

// Used to ensure a worker can reach the conductor's gRPC server before it starts its job.
message Handshake {
  WorkerIdentity worker = 1;
  string worker_message = 2;
}
message HandshakeResponse {
  string worker_message = 2;
}

// ---- conductor gRPC service  --------------------------------
service WorkerEventReceiverService {
  rpc WorkerStartsTest(Test) returns (TestResponse);
  rpc WorkerStartsHandshake(Handshake) returns (HandshakeResponse);
  rpc WorkerStartsShutdown(Shutdown) returns (GeneralResponse);
  rpc WorkerRequestsWorkFiles(FileTransferRequest) returns (stream FileTransferChunk);
  rpc WorkerUploadsFiles(stream FileTransferChunk) returns (GeneralResponse);
  rpc WorkerSendsCodexError(CodexError) returns (GeneralResponse);
}
